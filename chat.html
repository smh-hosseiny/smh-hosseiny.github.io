<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with My CV - Seyed Hosseini</title>
    <!-- Link to your existing site styles -->
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        /* Chat shell — matches design system */
        .chat-shell {
            max-width: 700px;
            margin: 2em auto;
            background: #282935;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 70vh;
            max-height: 600px;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.1em;
            color: #fff;
            line-height: 1;
        }

        .chat-header .back-link {
            color: #a3a5a9;
            font-size: 0.85em;
            text-decoration: none;
            border: 0;
            transition: color 0.2s ease-in-out;
        }

        .chat-header .back-link:hover {
            color: #fff;
        }

        .chat-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 18px 22px;
            gap: 14px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.55;
        }

        .user-message {
            background-color: #4a90e2;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .bot-message {
            background-color: #34354a;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 12px;
            flex-shrink: 0;
        }

        .chat-input input {
            flex: 1;
            padding: 0 14px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #e2e8f0;
            background: #1a1b26;
            font-family: 'Inter', 'Lato', sans-serif;
            font-size: 14px;
            outline: 0;
        }

        .chat-input input:focus {
            border-color: #4a90e2;
        }

        .chat-input button {
            background-color: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 0 1.2em;
            height: 40px;
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.2s ease-in-out;
        }

        .chat-input button:hover {
            background-color: #5a9de8;
        }

        .typing-indicator {
            display: none;
            padding: 10px 14px;
            background-color: #34354a;
            border-radius: 10px;
            align-self: flex-start;
            max-width: 80%;
        }

        .typing-indicator span {
            display: inline-block;
            width: 7px;
            height: 7px;
            background-color: #a3a5a9;
            border-radius: 50%;
            margin-right: 4px;
            animation: typing 1s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .error-message {
            color: #ff6b6b;
            background-color: rgba(222, 30, 30, 0.15);
            padding: 10px;
            border-radius: 5px;
        }

        .send-button-disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .char-counter {
            font-size: 11px;
            color: #a3a5a9;
            font-family: 'Source Code Pro', monospace;
        }

        @media screen and (max-width: 480px) {
            .chat-shell {
                margin: 10px;
                height: calc(100vh - 64px);
                max-height: none;
            }

            .chat-input {
                flex-direction: column;
            }

            .chat-input button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="is-preload">

    <!-- Include your site header here -->
    
    <div id="wrapper">
        <div id="main">
            <section>
                <div class="chat-shell" role="main">
                    <header class="chat-header">
                        <h2>Chat with My CV</h2>
                        <a href="index.html" class="back-link">&larr; Back to Homepage</a>
                    </header>
                    <div class="chat-body">
                        <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
                            <div class="message bot-message">
                                Hi there! I'm Seyed's CV assistant. Ask me anything about his education, research, publications, or skills!
                            </div>
                            <div class="typing-indicator" id="typing-indicator">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                        <div class="chat-input">
                            <input type="text" id="message-input" placeholder="Type your message..."
                                   autocomplete="off" aria-label="Type your message">
                            <span id="char-counter" class="char-counter">0/500</span>
                            <button id="send-button" aria-label="Send message">Send</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Include your site footer here -->

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        const messagesContainer = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');
        
        const API_URL = 'https://smh-hosseiny-github-io.onrender.com/api/chat';
        
        // Rest of the chat JavaScript (from the previous template)
        function addMessage(message, isUser) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.classList.add(isUser ? 'user-message' : 'bot-message');
            messageElement.innerText = message;
            
            messagesContainer.insertBefore(messageElement, typingIndicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function showTypingIndicator() {
            typingIndicator.style.display = 'block';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }
        
        function validateInput(message) {
            if (message.length > 500) {
                addMessage('Message is too long. Please keep it under 500 characters.', false);
                return false;
            }
            return true;
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (message && validateInput(message)) {
                // Disable input and button while sending
                messageInput.disabled = true;
                sendButton.disabled = true;
                sendButton.classList.add('send-button-disabled');
                
                addMessage(message, true);
                messageInput.value = '';
                
                showTypingIndicator();
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ message })
                    });
                    
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    
                    const data = await response.json();
                    hideTypingIndicator();
                    if (!data.response && !data.error) {
                        throw new Error('Empty response from server');
                    }
                    addMessage(data.error || data.response, false);
                } catch (error) {
                    console.error('Error:', error);
                    hideTypingIndicator();
                    addMessage('Sorry, something went wrong. Please try again later.', false);
                } finally {
                    // Re-enable input and button
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                    sendButton.classList.remove('send-button-disabled');
                    messageInput.focus();
                }
            }
        }
        
        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () => {
            const count = messageInput.value.length;
            document.getElementById('char-counter').textContent = `${count}/500`;
        });
    </script>
</body>
</html>
